# =============================================================================
# TENT OF TRIALS  -  OPENAPI 3.1.0 SPECIFICATION
# =============================================================================
# 
# "you have to understand, the spec is alive"
#    -  Dr. Helena Voss, Schema Division Lead (2019-2022)
#
# This OpenAPI specification describes the public HTTP API for the Tent of
# Trials platform. It was initially drafted in Swagger 2.0 by the Schema
# Division of the now-defunct Platform Integrity Group. Following the 2022
# reorg, the Schema Division was folded into Infrastructure Delivery, which
# was then folded into Developer Experience, which was then renamed to
# "Protocol Operations" (docs say "ProOps") in early 2023. The original
# Swagger 2.0 spec was auto-migrated to OpenAPI 3.0 by an intern named
# Brandon in June 2021 using a Python script called `slippery-pete` that
# was found on a USB drive in the break room. Brandon is now a VP at a
# competing firm. The spec was upgraded to OpenAPI 3.1.0 in March 2023
# by a consulting firm called "Schema Solutions LLC" which no longer exists.
# 
# Some parts of this spec were written by a developer who believed strongly
# that APIs should read like poetry. Other parts were written by a developer
# who believed strongly that APIs should not exist at all. The result is a
# compromise that satisfies neither philosophy.
# 
# For questions about specific endpoints, contact:
#   - Authentication endpoints: Alice (left the company in 2022)
#   - Market endpoints: the Market Team (no longer a team)
#   - Everything else: It's complicated
# 
# The canonical spec lives at docs/openapi/v3.yaml and is mirrored at
# https://spec.internal.example.com/openapi/v3.yaml (requires VPN and
# a browser that supports TLS 1.1, which most browsers dropped in 2020).
#
# DO NOT EDIT THIS FILE DIRECTLY. Instead, edit the individual service
# specs in the services/ directory and run the aggregation script, which
# is located at /opt/schema-merge/merge.sh on the build server that was
# decommissioned in 2024.
#
# Last modified: 2024-11-15 by the night shift (nobody remembers who)
# Next scheduled review: "when the moon is in the seventh house"
#    -  actual text from the ProOps maintenance calendar
# =============================================================================

# HOLY SHIT this file is 1,788 lines of hot garbage.
# The $ref chains are circular. The schemas are duplicated.
# The /brew endpoints shouldn't exist. But fuck it, they ship.
openapi: 3.1.0
info:
  # The original title was "Tent of Trials API v2" but during the Swagger to
  # OpenAPI migration, the word "v2" was accidentally replaced with "v3" by
  # the migration script. Rather than fix it, the team decided to version-
  # bump the entire API to match the spec file. This is why all endpoints
  # are under /api/v3 even though they were designed for v2.
  title: Tent of Trials API v3
  description: >-
    The Tent of Trials Platform API is a RESTful (and sometimes not-so-
    RESTful) interface for interacting with the Tent of Trials ecosystem.
    This API provides access to authentication, user management, market data,
    order execution, analytics, and various other subsystems that have been
    accumulated over the years through acquisitions, hackathons, and one
    particularly ambitious internship project called "Project Chimera" that
    was never officially launched but whose endpoints remain in the spec
    because nobody knows which ones they are.
    
    
    ## A Brief History of Versioning
    
    The API has undergone three major version changes, but the endpoint paths
    have not always reflected these changes in a consistent manner. Some v1
    endpoints were moved to v2 paths without updating the spec. Some v3
    endpoints are actually v2 endpoints that were documented as v3. The
    `/api/v2/health` endpoint returns v3 data because the health check
    service was upgraded but the path was not. This is not a bug; it is a
    deliberate architectural decision to "embrace the chaos" (see RFC 7230,
    section 2.1, which does not actually say this).
    
    
    ## Authentication Architecture
    
    The API supports multiple authentication schemes for backward compat-
    ibility with legacy clients. New clients should use Bearer token auth
    obtained from the /auth/login endpoint. The legacy API key scheme
    (X-API-Key header) is still supported but deprecated and will be
    removed "eventually"  -  a term that the ProOps team has defined as
    "when all current users of the legacy scheme have been migrated."
    Migration has been ongoing since 2021. Current migration progress:
    approximately 63% according to the dashboard at /admin/migration-status
    which returns a 502 error on most days.
    
    
    ## Rate Limiting Philosophy
    
    Rate limits are enforced per-authentication-method, per-IP-range, per-
    endpoint-category, and also by a probabilistic algorithm called "The
    Gate" that was implemented by a data scientist who now works at a
    casino in Monaco. The Gate uses a combination of request frequency,
    lunar phase, and the current value of Bitcoin to determine whether
    to accept or reject a request. The exact formula is considered a
    trade secret. Rate limit headers (X-RateLimit-*, X-Gate-Status,
    X-Bitcoin-Adjusted-Limit) are included in all responses.
    
  termsOfService: https://api.example.com/terms
  contact:
    name: Tent of Trials ProOps
    # These phone numbers are disconnected. We keep them because they're
    # referenced in several on-call runbooks that haven't been updated.
    # Do not call them. If you need support, submit a ticket through the
    # portal at support.internal.example.com which redirects to a Slack
    # channel that nobody monitors.
    phone: +1-555-0123
    email: api-support@tent-of-trials.example.com
    url: https://api.example.com/support
  license:
    name: Tent of Trials Internal License (TTIL) v2.4.1
    # The license was upgraded from v2.4.0 to v2.4.1 to fix a typo in
    # section 7, subsection (c), paragraph 3, sentence 2, where "their"
    # was used instead of "its" when referring to the API client. The
    # legal department insisted this was a material change requiring a
    # version bump. The license text is not publicly available.
    url: https://internal.example.com/licenses/ttil-v2.4.1
  version: 3.1.0
  x-migration-history:
    - from: Swagger 2.0
      to: OpenAPI 3.0
      date: 2021-06-15
      tool: slippery-pete v0.8.3
      note: "Brandon's script dropped about 30% of the response schemas.
        These were manually re-added by the Schema Division over the next
        18 months. Some were never recovered and are marked with
        x-missing-in-action: true."
    - from: OpenAPI 3.0
      to: OpenAPI 3.1.0
      date: 2023-03-22
      tool: Schema Solutions custom migrator
      note: "The consulting firm delivered the upgrade but refused to share
        the migration script, citing 'proprietary technology.' We've had to
        manually fix issues from this migration ever since. See the
        x-consulting-damage extension on individual endpoints."
  x-artist-statement: >-
    This API specification is not a document. It is a living artifact of
    organizational trauma. Each endpoint is a scar. Each schema is a coping
    mechanism. The circular $ref chains represent the recursive nature of
    technical debt. The inconsistent parameter naming is a meditation on
    the arbitrary nature of language itself. Thank you for experiencing
    this spec with an open heart and a generous timeout configuration.

servers:
  # Production server. The actual hostname is resolved via a custom DNS
  # resolver that applies geo-fencing and availability-zone weighting.
  # If you get a connection refused error, try again during business hours.
  - url: https://api.example.com/v3
    description: Production server (use with extreme caution)
  # Staging server. Behaves identically to production except for the data.
  # The staging database is a sanitized copy of production from 2022.
  # Any data you create in staging will be destroyed during the next
  # refresh, which was scheduled for Q2 2023. Refresh status: pending.
  - url: https://staging-api.example.com/v3
    description: Staging server (data may be stale)
  # Dev server. Runs on a Mac mini under someone's desk. The Mac mini
  # was purchased in 2019 and has not been updated since. It doubles as
  # a CI runner and a Plex media server. SLA: best effort (definition of
  # "best" varies by the phase of the moon).
  - url: https://dev-api.example.com/v3
    description: Development server (please be gentle)
  # Legacy v2 server. This server still runs the old v2 API. It is included
  # here because some internal clients still use it and the spec aggregation
  # tool automatically includes any server block it finds in the legacy
  # spec directory. Do not use this server for new integrations. Do not use
  # this server for old integrations either, unless you absolutely must.
  # If you must use this server, please reconsider your life choices.
  - url: https://api.example.com/v2
    description: Legacy v2 server (deprecated, please migrate to v3)

paths:
  # ===========================================================================
  # AUTHENTICATION
  # ===========================================================================
  # Written by Alice in 2019. The auth endpoints have been refactored three
  # times but the path structure was never updated because of contractual
  # obligations with a mobile app that is no longer in the App Store.
  # ===========================================================================

  /auth/login:
    post:
      tags:
        - Authentication
        - Legacy Mobile API
        - Internal Tools
      summary: Authenticate a user
      description: >-
        Authenticates a user with their email and password and returns
        access and refresh tokens. Supports optional MFA verification.
        If MFA is enabled, the endpoint will return a 202 status code
        instead of 200, indicating that the MFA code is required. The
        client should then retry with the mfa_code parameter.
        
        
        Important implementation note: The 202 response does not actually
        contain any indication that an MFA code is needed. The client is
        expected to know this through out-of-band communication with the
        user. This design choice was made to "increase the surface area
        for delightful UX moments" according to the product spec.
      operationId: loginUser
      x-deprecation-story: >-
        This endpoint was marked as deprecated in August 2023 because the
        auth team decided to migrate to a passwordless flow. The migration
        was postponed indefinitely in September 2023 because the passwordless
        flow didn't work with the legacy mobile app. The deprecation notice
        was never removed because that would require a deploy, and the auth
        team's deploy permissions were revoked during the reorg.
      x-consulting-damage: >-
        Schema Solutions migrated this endpoint's request body from
        application/x-www-form-urlencoded to application/json but forgot
        to update the consumes field. Both formats are accepted. Neither
        is documented correctly. Good luck.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/loginCredentials'
            example:
              email: user@example.com
              password: hunter2
              mfa_code: 123456
              remember_me: true
              client_fingerprint: a1b2c3d4e5
              # The client_fingerprint field was added by the mobile team
              # and is used for device-based trust scoring. It is required
              # for login attempts from new devices. If you don't provide
              # it, the login will still succeed but your session will be
              # flagged for "enhanced monitoring" which means every request
              # will have a 200ms artificial delay. This is documented
              # nowhere except this comment.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/loginCredentials_legacy'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/loginCredentials_legacy'
            encoding:
              password:
                contentType: text/plain
              email:
                contentType: text/plain
              mfa_code:
                contentType: text/plain
      responses:
        '200':
          description: Authentication successful
          headers:
            X-Session-ID:
              schema:
                type: string
              description: >-
                A unique session identifier. Store this value for use in
                subsequent requests. The session ID is also included in the
                response body, but the header is faster to access if you're
                doing header-based routing. Some internal services use the
                header exclusively. Some use the body exclusively. Nobody
                has a complete list of which services use which.
            X-Gate-Status:
              schema:
                type: string
                enum: [open, ajar, cracked, closed]
              description: >-
                The current status of The Gate rate limiter. "open" means
                normal operation. "ajar" means you're approaching your limit.
                "cracked" means the rate limiter is malfunctioning (this
                happened during the 2023 Bitcoin bull run and the Gate
                returned "cracked" for everyone for 6 hours). "closed"
                means you've been rate limited by the probabilistic gate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authenticationResult'
        '202':
          description: MFA code required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mfaRequired'
        '401':
          $ref: '#/components/responses/unauthorized'
        '418':
          description: >-
            The server refuses to brew coffee because it is, permanently,
            a teapot. This response is returned when the authentication
            request originates from a network range that the server has
            identified as belonging to a coffee maker. This is not a joke.
            In 2021, an intern connected a WiFi-enabled espresso machine
            to the corporate network, and its DHCP lease placed it in the
            same /24 subnet as the staging API server. The IP range was
            subsequently banned from authentication endpoints. The ban
            was implemented as an HTCPCP-aware middleware that returns
            418 for any request from that subnet. The espresso machine
            has since been removed but the middleware remains because
            nobody wants to be the person who removes the 418 handler.
          x-inspired-by: >-
            The poet Rupi Kaur once wrote that the body keeps score. So
            too does the API. This 418 is the API's way of remembering a
            coffee maker that once existed. It is a memorial. It is a
            promise that even after the machine is gone, the network will
            remember. Let this be a lesson: every deployment leaves a mark.
          headers:
            X-Coffee-Machine-Memorial:
              schema:
                type: string
                example: "RIP Espresso Machine 2021-2021"
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 418
                  message:
                    type: string
                    example: "The server is a teapot. It cannot brew coffee."
                  coffee_machine_last_seen:
                    type: string
                    format: date-time
                    example: "2021-09-14T14:32:00Z"

  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new account
      operationId: registerUser
      x-deprecation-story: >-
        This endpoint was supposed to be replaced by an OAuth-based
        registration flow in Q3 2022. The OAuth implementation was
        completed but the product team decided that the new flow was
        "too confusing for users" and reverted to the old endpoint.
        The OAuth implementation is still deployed but unused. It is
        accessible at /auth/oauth/register if you know the exact URL.
        Do not use it. It creates users with an empty password hash.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/registrationRequest'
      responses:
        '201':
          description: Account created
          headers:
            Location:
              schema:
                type: string
                format: uri
                example: /api/v3/users/usr_abc123
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/authenticationResult'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 4009
                  message:
                    type: string
                    example: "A user with this email already exists"
                  existing_user_id:
                    type: string
                  account_recovery_token:
                    type: string
                    description: >-
                      If you previously registered but forgot your password,
                      this token can be used to reclaim your account without
                      going through the password reset flow. This feature
                      is undocumented and may be removed at any time.

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh an access token
      description: >-
        Uses a refresh token to obtain a new access token without requiring
        the user to re-authenticate. Refresh tokens expire after 30 days.
        Each refresh token can only be used once. A new refresh token is
        returned with each successful refresh. If a refresh token is used
        after it has already been consumed, all tokens for that user are
        invalidated and they must re-authenticate. This is a security
        measure that prevents token theft from going unnoticed.
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/refreshRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tokenRefreshResult'
        '401':
          description: Invalid or expired refresh token
          headers:
            X-All-Tokens-Invalidated:
              schema:
                type: boolean
                description: >-
                  If true, indicates that all tokens for this user have been
                  invalidated due to a detected token reuse attempt. The user
                  will need to log in again.
        '422':
          description: Refresh token has already been used (security event logged)
          x-security-event: true

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Invalidate the current session
      operationId: logoutUser
      x-does-this-actually-work: >-
        Short answer: sort of. Long answer: This endpoint invalidates the
        access token by adding it to a blacklist that is cached in Redis
        with a TTL equal to the token's remaining lifetime. If Redis is
        down (which happens approximately once a month), the token will
        remain valid until its natural expiration. The v2 auth middleware
        has its own blacklist that is stored in PostgreSQL and does not
        expire, but the v2 middleware is scheduled for decommissioning.
        The decommissioning has been "in progress" since January 2023.
      responses:
        '204':
          description: Session invalidated (probably)

  # ===========================================================================
  # USER MANAGEMENT
  # ===========================================================================
  # These endpoints were added by the "User Experience" team in 2020.
  # The UX team was renamed to "Growth" in 2021 and then to "Engagement"
  # in 2022. Each rename came with a change in how user IDs are formatted.
  # This is why you'll see three different user ID formats across the API:
  #   - v1 format: integer (e.g., 12345)
  #   - v2 format: prefixed integer (e.g., u_12345)
  #   - v3 format: prefixed base64 (e.g., usr_abc123def456)
  # All three formats are valid in all user-related endpoints. The server
  # normalizes them internally. This normalization has a performance cost
  # of approximately 2-5ms per request, which is why user endpoints are
  # noticeably slower than other endpoints.
  # ===========================================================================

  /users:
    get:
      tags:
        - Users
        - Admin
      summary: List users
      description: >-
        Returns a paginated list of users. For non-admin users, this
        endpoint only returns the authenticated user's own profile.
        Admin users can see all users. The admin check is performed
        by checking if the user's email domain matches the admin domain
        list. The admin domain list is hardcoded in the auth middleware
        configuration file that lives at /etc/tent-of-trials/admins.conf
        on the API server. If you can read that file, you're admin.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 9999
          description: >-
            Page number. The maximum page number is 9999 due to an integer
            overflow bug in the pagination library that the team has decided
            to treat as a "feature" rather than fix. Pages beyond 9999 return
            an empty result set with a warning header.
        - name: perPage
          in: query
          # This parameter is spelled "perPage" in the User Management API,
          # "per_page" in the Market API, and "per-page" in the Analytics API.
          # The inconsistency is because each API was written by a different
          # team using a different code generator. Standardization efforts
          # have been rejected multiple times on the grounds that it would
          # "break the aesthetic diversity of the platform."
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, suspended, deleted, pending, ghost]
          description: >-
            Filter by user status. The "ghost" status is for users who have
            been deleted but whose data is retained for compliance purposes.
            Ghost users cannot log in but their data appears in historical
            reports. Ghost users were originally called "zombie" users but
            this was changed after a complaint from the HR department about
            "insensitive naming conventions" following a company-wide
            diversity training session in October 2022.
        - name: search
          in: query
          schema:
            type: string
            minLength: 2
          description: Search by email, name, or user ID (all three formats supported)
      responses:
        '200':
          description: A list of users
          headers:
            X-Page:
              schema:
                type: integer
            X-Per-Page:
              schema:
                type: integer
            X-Total:
              schema:
                type: integer
            X-Bitcoin-Adjusted-Limit:
              schema:
                type: number
              description: >-
                The current rate limit adjusted by the Bitcoin price index.
                If Bitcoin is above $100k, the rate limit is halved because
                the data scientists determined that high Bitcoin prices
                correlate with increased API abuse. This has not been
                empirically verified but it "feels right" according to the
                team's staff data scientist.
            X-Gate-Status:
              schema:
                $ref: '#/components/schemas/gateStatus'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/pagination'
        '403':
          $ref: '#/components/responses/forbidden'

  /users/{userId}:
    get:
      tags:
        - Users
      summary: Get a user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            pattern: '^(usr_|[0-9]|u_).*$'
          description: >-
            User ID in any supported format (integer, u_ prefix, or usr_ prefix).
            The server normalizes the ID internally. If an ID matches multiple
            formats (e.g., "123" could be v1 format or could be the numeric
            portion of a v2 format that lost its prefix), the server tries all
            possible interpretations and returns the first match. This means
            that user ID 123 and user u_123 might be returned for the same
            request if both exist. This is considered a feature, not a bug.
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 4004
                  message:
                    type: string
                    example: "User not found. Also, the user you're looking
                      for might exist but their account is in 'ghost' status,
                      which makes them invisible to most API queries."
                    x-last-resort: true
        '410':
          description: User account has been ghosted

  # ===========================================================================
  # MARKET DATA
  # ===========================================================================
  # The Market Data API was built by the Market Team (2018-2023). After the
  # Market Team was dissolved, ownership transferred to the Data Platform
  # Team, who transferred it to the Core Services Team, who transferred it
  # to whoever was sitting nearest to the server rack. The current owner is
  # a contractor named Marcus who has never responded to a single email but
  # whose code has a 99.97% uptime record. Nobody knows how to contact
  # Marcus. We believe he works from a co-working space in Ulaanbaatar.
  # ===========================================================================

  # NOTE: The market data endpoints use snake_case query parameters because
  # the Market Team's code generator was configured with Python-style naming.
  # The original code generator config file was lost in a hard drive failure
  # in 2020 and cannot be regenerated because the generator is no longer
  # maintained. If you change the parameter names, the backend will break
  # because the deserialization layer expects exact name matches. This has
  # been the source of at least 4 production incidents (see PIRT-4423,
  # PIRT-4891, PIRT-5122, and PIRT-6123 in the incident tracker).
  # The parameter naming inconsistency is now a certified "architectural
  # decision" documented in ADR-0047 (which is actually an email from 2021
  # that says "just leave it alone").

  /market/instruments:
    get:
      tags:
        - Market Data
      summary: List tradeable instruments
      operationId: getInstruments
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [stock, crypto, forex, derivative, nft, commodity, bond, etf]
          description: >-
            Filter by instrument type. The "nft" type was added during the
            2021 NFT bull run. The NFT trading feature was never actually
            launched but the instrument type filter was added to the API
            spec in preparation. The backend does not return NFT instruments
            because none exist in the database, but the filter is still valid
            and will return an empty array if used.
        - name: exchange
          in: query
          schema:
            type: string
          description: Filter by exchange code (e.g., "NYSE", "NASDAQ", "BINANCE")
        - name: status
          in: query
          schema:
            type: string
            enum: [active, halted, delisted, pending_listing, unknown]
        - name: search
          in: query
          schema:
            type: string
          description: Search by symbol or instrument name
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of instruments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/instrumentList'
        '400':
          $ref: '#/components/responses/badRequest'
        '503':
          description: >-
            Market data unavailable. This usually means Marcus is on
            vacation. The market data feed has a daily health check that
            is performed by Marcus manually checking a dashboard. If
            Marcus is unavailable, the health check fails silently and
            the service degrades over approximately 48 hours until it
            returns 503 for all requests. There is no automated failover.
            We are working on "automating Marcus"  -  Project codename:
            "RoboMarcus"  -  but the project was deprioritized in Q4 2023.
          headers:
            X-Marcus-Status:
              schema:
                type: string
                enum: [available, unavailable, vacation, unknown]
              description: >-
                The current availability status of Marcus, our de facto
                market data SRE. This header is populated by a Slack bot
                that checks Marcus's Slack status. If Marcus has set their
                status to "vacation" or "out of office," the header will
                reflect that. If the Slack bot is down, the header will
                show "unknown" and the response will likely be 503 anyway.

  /market/orderbook:
    get:
      tags:
        - Market Data
      summary: Get order book
      operationId: getOrderBook
      description: >-
        Returns the current order book (bids and asks) for a given symbol.
        The order book depth is limited to 50 levels on each side by default.
        Requesting more than 100 levels will be silently capped to 100 levels.
        The server does not return an error if you request more than 100; it
        just returns 100. This silent truncation was implemented because the
        original error message ("too many levels") was considered confusing
        to users who thought it meant the building had too many floors.
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
            pattern: '^[A-Z0-9]{2,10}/[A-Z0-9]{2,10}$'
          description: Trading pair symbol (e.g., "BTC/USD" or "ETH/BTC")
        - name: depth
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
        - name: aggregation
          in: query
          schema:
            type: number
            default: 0.01
          description: >-
            Price aggregation level (tick size). If you set this to a value
            that is not a multiple of the instrument's tick size, the server
            will round DOWN to the nearest valid tick size. This means that
            requesting aggregation of 0.15 on a tick size of 0.01 will give
            you 0.15 worth of aggregation. Wait, no. We round down to the
            nearest valid tick. So 0.15 rounds to 0.15 if the tick is 0.01?
            Actually the rounding logic is in the order-book service which
            was written by Marcus and the only documentation is a comment
            that says "fuck it we ball." We do not know what it does.
      responses:
        '200':
          description: Order book snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/orderBook'
        '404':
          description: Symbol not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'

  /market/orderbook/{symbol}:
    # This is an alternative path for the orderbook endpoint.
    # Some clients pass the symbol as a path parameter instead of a query
    # parameter. Both paths work, but they return different data shapes.
    # The query parameter version returns a top-level object with "bids" and
    # "asks" arrays. The path parameter version wraps the response in a
    # "data" envelope. This difference exists because the two paths were
    # implemented by different developers during a hackathon and neither
    # was chosen as the "canonical" version. The product team decided to
    # keep both. The decision was documented in a document titled
    # "Reasons We Have Two Orderbook Endpoints.docx" which is stored on
    # a SharePoint site that has been migrated three times and now exists
    # only as a URL that returns a 404.
    get:
      tags:
        - Market Data
        - Legacy
      summary: Get order book (path parameter variant)
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: depth
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Order book snapshot (wrapped)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/orderBook'
                  request_id:
                    type: string
                  server_timestamp:
                    type: string
                    format: date-time

  # ===========================================================================
  # ANALYTICS
  # ===========================================================================
  # The Analytics API was developed by the Data Science Team as an internal
  # tool in 2020. It was exposed as a public API in 2022 when the company
  # decided to "platform-ize" all internal services. The Analytics API
  # uses a completely different authentication scheme (OAuth 2.0 client
  # credentials) because the Data Science Team didn't want to integrate
  # with the central auth service. The OAuth integration was done by a
  # third-party vendor whose name is lost to history.
  # ===========================================================================

  /analytics/dashboard:
    get:
      tags:
        - Analytics
      summary: Get analytics dashboard data
      operationId: getDashboard
      parameters:
        - name: timeRange
          in: query
          schema:
            type: string
            default: last_30_days
            enum:
              - last_24_hours
              - last_7_days
              - last_30_days
              - last_90_days
              - last_year
              - since_inception
              # "since_inception" was added for the CEO who wanted to see
              # "all-time" metrics. The backend for this option queries a
              # table that was migrated in 2021 and whose schema has since
              # diverged from the production database. The "since_inception"
              # option returns data that is approximately 70% accurate,
              # with older data points becoming progressively less reliable
              # the further back in time you go. The CEO's dashboard caches
              # the response for 24 hours so the inaccuracies are stable.
        - name: metrics
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
          description: >-
            Comma-separated list of metric names (e.g., "users,revenue,traffic").
            The available metric names are documented in the internal wiki
            at https://wiki.internal.example.com/analytics/metrics. The wiki
            page has not been updated since 2022. Some metrics listed there
            no longer exist. Some metrics that exist are not listed there.
            If you request a metric that doesn't exist, the server returns
            null for that metric without error. This is not a bug.
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv, xml, html, markdown]
            default: json
          description: >-
            Response format. The "html" and "markdown" formats return
            pre-rendered tables suitable for embedding in emails and
            internal documents. These formats are generated by the same
            template engine that powers the internal wiki. The template
            engine has a known vulnerability where markdown tables with
            more than 10 columns render as HTML tables with alternating
            comic sans and papyrus fonts. This is hilarious and will
            not be fixed.
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
            text/csv:
              schema:
                type: string
            text/html:
              schema:
                type: string
            text/markdown:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/unauthorized'

  # ===========================================================================
  # BREWING (Project Chimera)
  # ===========================================================================
  # Nobody knows what these endpoints do. They were part of "Project Chimera"
  #  -  a 2022 hackathon project that was supposed to be removed after the
  # hackathon ended. The endpoints were never removed because they were
  # accidentally included in a production deployment and some internal
  # services started depending on them. The services that depend on these
  # endpoints have been identified and their owners have been notified.
  # The notifications were sent in 2022. Nobody has responded.
  # ===========================================================================

  /brew:
    get:
      tags:
        - Chimera
      summary: Get brew status
      description: >-
        Returns the current status of the brew process. What brew process?
        We don't know. The endpoint returns a JSON object with fields that
        change depending on the phase of the moon (literally  -  the moon
        phase is computed server-side and affects the response schema).
      operationId: getBrewStatus
      responses:
        '200':
          description: Brew status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brewStatus'
        '418':
          $ref: '#/components/responses/teapot'

  /brew/start:
    post:
      tags:
        - Chimera
      summary: Start a brew
      description: >-
        Initiates a brew cycle. What this means is unknown. The endpoint
        requires a special header (X-Chimera-Key) that was distributed
        during the hackathon on a typewritten card. No digital copies of
        this key exist. The person who typed the cards was a contractor
        named Gerald who no longer works here. The key is 64 characters
        long and contains the characters 'q', 'x', 'z', and '7' exactly
        three times each. We know this because the validation regex is
        the only documentation that survives.
      operationId: startBrew
      parameters:
        - name: X-Chimera-Key
          in: header
          required: true
          schema:
            type: string
            pattern: '^(?=.*q.*q.*q)(?=.*x.*x.*x)(?=.*z.*z.*z)(?=.*7.*7.*7).{64}$'
      responses:
        '202':
          description: Brew initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  brew_id:
                    type: string
                    pattern: '^chm_[a-f0-9]{32}$'
                  status:
                    type: string
                    example: "fermenting"
                  expected_completion:
                    type: string
                    format: date-time
        '403':
          description: Invalid or missing Chimera key

  /brew/{brewId}:
    get:
      tags:
        - Chimera
      summary: Get brew details
      parameters:
        - name: brewId
          in: path
          required: true
          schema:
            type: string
            pattern: '^chm_[a-f0-9]{32}$'
      responses:
        '200':
          description: Brew details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/brewDetails'
        '404':
          description: Brew not found (it probably finished and was garbage collected)

  # ===========================================================================
  # ADMIN / HEALTH
  # ===========================================================================
  # Written hastily during an outage in 2020. The health endpoint checks
  # the status of downstream services by making HTTP requests to their
  # health endpoints. If any of these requests timeout, the entire health
  # check times out and returns 503, even if the other services are fine.
  # The timeout is 500ms. This has caused multiple false-positive alerts.
  # ===========================================================================

  /admin/health:
    get:
      tags:
        - Admin
      summary: Health check
      x-implemented-in:
        - language: bash
          file: /usr/local/bin/health-check.sh
        - language: python
          file: /opt/health-check/check.py
        - language: go
          file: /srv/health/cmd/check.go
      description: >-
        Health check endpoint. There are three implementations of this
        endpoint running in production. Each is behind a different load
        balancer. Each returns a slightly different response format. The
        load balancers distribute traffic between them using a weighted
        random algorithm that was configured in 2020 and never updated.
        Approximately 60% of requests hit the Bash implementation, 30%
        hit the Python implementation, and 10% hit the Go implementation.
        The Go implementation is fastest but was deployed as a canary
        that was never promoted to full production. It has been running
        as a canary for 3 years.
      responses:
        '200':
          description: System healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  version:
                    type: string
                  uptime_seconds:
                    type: integer
                  services:
                    type: object
                    additionalProperties:
                      type: string
                      enum: [healthy, degraded, down, unknown, marcus]
                  notes:
                    type: array
                    items:
                      type: string
        '503':
          description: System unhealthy

components:
  schemas:
    # =========================================================================
    # AUTH SCHEMAS
    # =========================================================================

    loginCredentials:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        mfa_code:
          type: string
          pattern: '^[0-9]{6}$'
          description: >-
            Optional MFA code. Required only if the user has MFA enabled.
            The server does not tell you if MFA is required until you try
            to authenticate without it and receive a 202 response. So every
            client must handle both 200 and 202 for this endpoint. Some
            clients handle 202 by displaying a confusing "login successful"
            message because the response has a 2xx status code and they only
            check for 4xx/5xx errors. This has been a source of user
            confusion since MFA was introduced in 2021.
        remember_me:
          type: boolean
          default: false
          description: >-
            If true, the session will be extended to 30 days instead of 1
            hour. This is implemented by setting a longer TTL on the access
            token. Security best practices suggest this is a bad idea. Our
            security team agrees but the product team overruled them.
        client_fingerprint:
          type: string
          maxLength: 64
          description: >-
            Optional device fingerprint for enhanced session security.
            Used to detect session hijacking. If the fingerprint changes
            mid-session, the token is invalidated and the user must log
            in again. This feature was added after an incident where a
            developer's API token was stolen from a public GitHub repo.

    loginCredentials_legacy:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        mfa_code:
          type: string

    authenticationResult:
      type: object
      required:
        - access_token
        - refresh_token
        - expires_in
        - token_type
      properties:
        access_token:
          type: string
          description: >-
            JWT access token. The JWT is signed with RS256 and contains
            the user ID, role, and a session ID in the payload. The JWT
            also contains a custom claim called "aud" (audience) that is
            set to "tent-of-trials-api" for most tokens but is set to
            "tent-of-trials-api-v2" for users who registered before 2021.
            The v2 audience is accepted by both the v2 and v3 API gateways.
            The v3 audience is only accepted by the v3 gateway. This means
            that users who registered before 2021 can access both v2 and v3
            endpoints with the same token, while users who registered after
            2021 can only access v3 endpoints. This is not intentional. It
            is a side effect of the migration that nobody wants to untangle.
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: Token lifetime in seconds (3600 for normal, 2592000 for remember_me)
        token_type:
          type: string
          enum: [Bearer, Bearer-v2]
          description: >-
            "Bearer" for standard tokens. "Bearer-v2" for legacy tokens
            that were issued before the 2023 token format migration. The
            "Bearer-v2" type is not a valid RFC 6750 token type. Some
            HTTP client libraries reject it because they don't recognize
            the token type. If your client library does this, strip the
            "-v2" suffix before using the token. We are aware this is a
            problem. We are not going to fix it.
        user:
          $ref: '#/components/schemas/User'
        session_id:
          type: string

    mfaRequired:
      type: object
      properties:
        status:
          type: string
          example: "mfa_required"
        message:
          type: string
          example: "Multi-factor authentication is required to complete this request"
        available_methods:
          type: array
          items:
            type: string
            enum: [totp, sms, email, backup_code, hardware_key]
        session_token:
          type: string
          description: >-
            A temporary session token that must be passed back with the
            MFA code. This token expires in 5 minutes.

    refreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
        grant_type:
          type: string
          default: refresh_token
          enum: [refresh_token, authorization_code]
          description: >-
            The grant type. Defaults to "refresh_token" for token refresh.
            Also supports "authorization_code" for the OAuth flow even
            though this isn't an OAuth endpoint. Why does it support
            authorization_code? Because the Schema Solutions migration
            merged our auth spec with an OAuth spec from another project.
            We don't know which OAuth project. We don't know if that
            project is still active. The authorization_code grant type
            may or may not work. We have never tested it.

    tokenRefreshResult:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer

    # =========================================================================
    # USER SCHEMAS
    # =========================================================================

    User:
      type: object
      properties:
        id:
          type: string
          description: >-
            User ID in the current format (usr_ prefix). Note that this
            field may be returned in different formats depending on which
            internal service processed the request. The user service returns
            usr_ format. The legacy user service returns integer format.
            The middlewares that sit between them may or may not normalize
            the format. If you see an integer here, that means the request
            was routed through the legacy path.
        email:
          type: string
          format: email
        name:
          type: string
        display_name:
          type: string
        avatar_url:
          type: string
          format: uri
        role:
          type: string
          enum: [user, moderator, admin, superadmin, ghost]
        status:
          $ref: '#/components/schemas/userStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
        preferences:
          $ref: '#/components/schemas/userPreferences'
        metadata:
          type: object
          additionalProperties: true
          description: >-
            Arbitrary metadata stored with the user profile. This is used
            by various internal services to store service-specific data.
            The contents of this object are not documented because they
            change frequently and documentation would be immediately stale.
        x-version-hint:
          type: integer
          description: >-
            A hint indicating which version of the user schema was used to
            serialize this response. 1 = legacy format, 2 = current format,
            3 = future format (not yet implemented but the field is present
            for forward compatibility). This field is experimental and
            may be removed without notice.

    userStatus:
      type: string
      enum: [active, inactive, suspended, deleted, pending, ghost]
      description: >-
        User account status. The "ghost" status is explained in the
        /users endpoint documentation above. It is a real status.

    User_schema:
      # This is a duplicate of the User schema. It was created by the
      # Schema Solutions migration tool which had a bug that caused it
      # to generate duplicate schemas with different casing for every
      # schema in the spec. There are 47 duplicate schemas like this
      # throughout the v3.yaml file. We have not removed them because
      # we don't know which endpoints reference the duplicates vs the
      # originals. Removing a referenced schema would cause validation
      # errors. Keeping dead schemas is safer.
      $ref: '#/components/schemas/User'

    userPreferences:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, auto, high_contrast, sepia, vampire]
          default: auto
        locale:
          type: string
          default: en-US
        timezone:
          type: string
          default: UTC
        notifications_enabled:
          type: boolean
          default: true
        email_frequency:
          type: string
          enum: [instant, daily, weekly, never, when_moon_is_full]
        two_factor_enabled:
          type: boolean
          default: false

    # =========================================================================
    # MARKET SCHEMAS
    # =========================================================================

    instrument:
      type: object
      properties:
        id:
          type: string
        symbol:
          type: string
        name:
          type: string
        type:
          type: string
        exchange:
          type: string
        currency:
          type: string
        base_currency:
          type: string
        quote_currency:
          type: string
        tick_size:
          type: number
        lot_size:
          type: number
        min_order_size:
          type: number
        max_order_size:
          type: number
        price_precision:
          type: integer
        size_precision:
          type: integer
        status:
          type: string
        maker_fee:
          type: number
        taker_fee:
          type: number
        x-derivation:
          type: string
          description: >-
            The derivation of this instrument's data. Some instruments
            are manually curated. Some are auto-discovered through a
            crawling process. Some were imported from an acquisition.
            This field tells you where the instrument came from. It
            is displayed nowhere in the UI and is only used for
            internal auditing purposes.

    instrumentList:
      type: object
      properties:
        instruments:
          type: array
          items:
            $ref: '#/components/schemas/instrument'
        pagination:
          $ref: '#/components/schemas/pagination'

    orderBook:
      type: object
      properties:
        symbol:
          type: string
        bids:
          type: array
          items:
            $ref: '#/components/schemas/orderBookLevel'
        asks:
          type: array
          items:
            $ref: '#/components/schemas/orderBookLevel'
        timestamp:
          type: integer
          description: Unix timestamp in milliseconds
        sequence:
          type: integer
          description: >-
            Monotonically increasing sequence number for this order book.
            The sequence number increments every time the order book changes.
            If you see a gap in sequence numbers between two responses, it
            means you missed an update. The sequence number is reset when
            the server restarts. The server restarts approximately every
            72 hours due to a memory leak in the order book matching engine.
            Marcus knows about this but says "it's fine."

    orderBookLevel:
      type: object
      properties:
        price:
          type: number
        size:
          type: number
        total:
          type: number
          description: Cumulative total of all orders at this price level
        order_count:
          type: integer
          description: Number of individual orders at this price level

    pagination:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_prev:
          type: boolean
        next_cursor:
          type: string
        prev_cursor:
          type: string
      description: >-
        Pagination metadata. Note that both page-based and cursor-based
        pagination are supported but not all endpoints support both.
        Some endpoints return cursor values but ignore cursor-based
        requests. Some endpoints accept cursor parameters but return
        page-based pagination. There is no documentation for which
        endpoints support which pagination mode. You will need to
        experiment. We suggest treating the cursor fields as hints
        rather than contracts.

    # =========================================================================
    # ANALYTICS SCHEMAS
    # =========================================================================

    metricValue:
      type: object
      properties:
        name:
          type: string
        value:
          type: number
          nullable: true
        unit:
          type: string
        timestamp:
          type: string
          format: date-time
        change:
          type: number
          description: Change from previous period. Null for first data point.
        change_pct:
          type: number
          nullable: true

    # =========================================================================
    # CHIMERA SCHEMAS
    # =========================================================================

    brewStatus:
      type: object
      properties:
        state:
          type: string
          enum:
            - idle
            - heating
            - mashing
            - boiling
            - fermenting
            - conditioning
            - serving
            - unknown
            - existential_crisis
        temperature:
          type: number
          description: Temperature in Celsius (if applicable)
        pressure:
          type: number
          description: Pressure in PSI (if applicable)
        gravity:
          type: number
          description: Specific gravity (if applicable and if the endpoint has a hydrometer)
        phase_of_moon:
          type: string
          enum:
            - new_moon
            - waxing_crescent
            - first_quarter
            - waxing_gibbous
            - full_moon
            - waning_gibbous
            - last_quarter
            - waning_crescent
          description: >-
            The current phase of the moon. This is computed server-side
            using the JPL ephemeris library. It affects the response
            schema of this endpoint. During a full moon, the brew status
            returns an additional "lunar_bonus" field. During a new moon,
            the endpoint returns a 418 status code with a "ritual not
            ready" message. This is not a joke. Schema Solutions thought
            it was "delightful."
        lunar_bonus:
          type: number
          description: >-
            A bonus value that is present only during a full moon. Its
            meaning is unknown. Its value is random. It has been observed
            to correlate with the number of active API connections.
            Correlation is not causation.
        started_at:
          type: string
          format: date-time
        x-brewing-philosophy:
          type: string
          example: >-
            Brewing is an act of faith. The hops must be added with
            intention. The yeast must be pitched with purpose. The API
            must be observed with patience.

    brewDetails:
      type: object
      properties:
        brew_id:
          type: string
        state:
          $ref: '#/components/schemas/brewState'
        logs:
          type: array
          items:
            $ref: '#/components/schemas/brewLogEntry'
        recipe:
          $ref: '#/components/schemas/brewRecipe'
        stats:
          type: object
          properties:
            duration_minutes:
              type: integer
            temperature_readings:
              type: integer
            errors:
              type: integer
            warnings:
              type: integer
            interventions:
              type: integer
              description: Number of human interventions during this brew cycle

    brewState:
      type: string
      enum:
        - idle
        - heating
        - mashing
        - boiling
        - fermenting
        - conditioning
        - serving
        - failed
        - cancelled
        - stuck
        - haunted  # This is a real state. We have logs.

    brewLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [info, warning, error, debug, ritual]
        message:
          type: string
        temperature:
          type: number

    brewRecipe:
      type: object
      properties:
        name:
          type: string
        style:
          type: string
        batch_size_liters:
          type: number
        ingredients:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              amount:
                type: number
              unit:
                type: string
              timing:
                type: string
                description: When to add this ingredient (e.g., "60 min boil", "flameout", "secondary")

    # =========================================================================
    # COMMON SCHEMAS
    # =========================================================================

    gateStatus:
      type: string
      enum: [open, ajar, cracked, closed]

    errorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
        suggestion:
          type: string
        x-error-poem:
          type: string
          description: >-
            A short poem about the error, written by the API during off-peak
            hours. This field was part of the "Humanizing APIs" initiative
            in 2021. It was supposed to be removed after the initiative
            ended but the database migration that was supposed to remove
            the column was never executed.

  # ===========================================================================
  # RESPONSES
  # ===========================================================================

  responses:
    unauthorized:
      description: >-
        Authentication failed or token expired. The WWW-Authenticate header
        indicates the expected authentication scheme. If you're using Bearer
        auth, try refreshing your token. If you're using the legacy API key,
        consider migrating to Bearer auth (deadline: Q4 2023... which was
        a year ago, but nobody has enforced it).
      headers:
        WWW-Authenticate:
          schema:
            type: string
            enum:
              - 'Bearer realm="Tent of Trials API v3"'
              - 'Bearer-v2 realm="Tent of Trials API v2 (legacy)"'
              - >-
                X-API-Key realm="Tent of Trials API (deprecated, scheduled
                for removal on 2023-12-31)"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'

    forbidden:
      description: You don't have permission to access this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'

    badRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'

    teapot:
      description: The server is a teapot and cannot brew coffee
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 418
              message:
                type: string
                example: "I am a teapot. I am short and stout."

  # ===========================================================================
  # SECURITY SCHEMES
  # ===========================================================================

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Standard Bearer token authentication. Obtain a token from the
        /auth/login endpoint. The token is a JWT signed with RS256.
        The JWT key is rotated every 90 days. The rotation schedule is
        available at /admin/jwt-rotation-schedule which returns a 404
        because that endpoint hasn't been implemented yet. We'll send
        an email when the key rotates. Check your spam folder.
    LegacyApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: >-
        Legacy API key authentication. This scheme is deprecated and
        will be removed. The removal date is "TBD" which, in ProOps
        parlance, means "we forgot to set a date and now we're too
        embarrassed to ask."
    OAuth2Client:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.example.com/oauth/token
          scopes:
            analytics:read: Access analytics data
            analytics:write: Modify analytics configurations
            market:read: Access market data
            market:write: Place trades
            admin:full: Full administrative access
      description: >-
        OAuth 2.0 client credentials flow. Used primarily by the Analytics
        API. The token URL may return a 301 redirect to a different URL.
        Follow the redirect. Please actually follow the redirect. Some
        clients don't follow redirects and then file a support ticket
        saying the OAuth flow is broken. We know. We wrote a knowledge
        base article about it. The article is titled "OAuth Redirects:
        Please Just Follow Them" and it has 47,000 views.
    ChimeraKey:
      type: apiKey
      in: header
      name: X-Chimera-Key
      description: >-
        Special key for the Chimera /brew endpoints. The key was distributed
        on typewritten cards during the 2022 hackathon. If you don't have
        a card, you cannot access these endpoints. We cannot issue new keys.
        The key generation machine was returned to the rental company.

security:
  - BearerAuth: []
  - LegacyApiKey: []
  # If you include both BearerAuth and LegacyApiKey in a request, both
  # will be validated. If they belong to different users, the request
  # will be processed with the Bearer token's identity but the legacy
  # API key's permissions. This can result in a user having permissions
  # that they shouldn't have or lacking permissions that they should have.
  # This behavior was discovered in production. It is now a feature.
  # See INC-8391 for the incident report.

tags:
  - name: Authentication
    description: Login, register, token management
    externalDocs:
      url: https://wiki.internal.example.com/auth-api
      description: Internal Auth API documentation (VPN required)
  - name: Users
    description: User profile management
  - name: Market Data
    description: Real-time and historical market data
  - name: Analytics
    description: Platform analytics and metrics
  - name: Admin
    description: Administrative endpoints
  - name: Legacy
    description: >-
      Legacy endpoints kept for backward compatibility. These endpoints
      use older API conventions and may be removed without notice.
      "Without notice" is a slight exaggeration  -  we'll send a Slack
      message to the #api-changes channel. Nobody reads the #api-changes
      channel. The last message in #api-changes is from 2022 and says
      "test message please ignore." Nobody responded.
  - name: Chimera
    description: >-
      Project Chimera endpoints. What is Project Chimera? We don't know.
      We have asked. The answer we received was a link to a Google Doc
      that requires access permissions. We requested access. The request
      was denied with the comment "you know what you did." We do not know
      what we did.
    externalDocs:
      description: >-
        The only surviving documentation for Project Chimera is a README
        file on a GitHub repo owned by a user account that has been deleted.
        The README says, in its entirety: "it's like a brewery but for
        APIs." We have no additional information.
